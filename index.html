<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cyclical Pantheon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; }
      @keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes slowRotateReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes connectionPulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.65; } }
      @keyframes centerGlow { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.18; } }
      @keyframes lightRadiance { 0%, 100% { opacity: 0.05; } 50% { opacity: 0.12; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
const { useState } = React;

const gods = [
  { name: "Light", color: "#E8E8E8", glow: "#FFFFFF", side: "light", opposite: "Darkness", domain: "Radiance, Clarity, Illumination" },
  { name: "Order", color: "#B8860B", glow: "#DAA520", side: "light", opposite: "Chaos", domain: "Structure, Law, Pattern" },
  { name: "Unity", color: "#BE185D", glow: "#F472B6", side: "light", opposite: "Division", domain: "Bonds, Togetherness, Harmony" },
  { name: "Creation", color: "#1E40AF", glow: "#3B82F6", side: "light", opposite: "Destruction", domain: "Birth, Origin, Genesis" },
  { name: "Growth", color: "#15803D", glow: "#4ADE80", side: "light", opposite: "Decay", domain: "Flourishing, Expansion, Life" },
  { name: "Eternity", color: "#9CA3AF", glow: "#D1D5DB", side: "light", opposite: "Oblivion", domain: "Permanence, The Everlasting" },
  { name: "Darkness", color: "#0A0A0A", glow: "#3F3F46", side: "dark", opposite: "Light", domain: "Shadow, The Unknown, Night" },
  { name: "Chaos", color: "#4C1D95", glow: "#8B5CF6", side: "dark", opposite: "Order", domain: "Entropy, Disorder, The Unbound" },
  { name: "Division", color: "#0E4D5C", glow: "#0891B2", side: "dark", opposite: "Unity", domain: "Separation, Fracture, Schism" },
  { name: "Destruction", color: "#991B1B", glow: "#EF4444", side: "dark", opposite: "Creation", domain: "Ruin, Annihilation, The End" },
  { name: "Decay", color: "#7C4A1E", glow: "#B45B1F", side: "dark", opposite: "Growth", domain: "Rot, Entropy, Deterioration" },
  { name: "Oblivion", color: "#3F3F46", glow: "#6B7280", side: "dark", opposite: "Eternity", domain: "Erasure, The Forgotten, Void" },
];

function PantheonCircle() {
  const [hoveredGod, setHoveredGod] = useState(null);
  const [selectedGod, setSelectedGod] = useState(null);
  const centerX = 350;
  const centerY = 360;
  const radius = 250;
  const orbRadius = 22;
  const total = gods.length;

  const getPosition = (index) => {
    const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
    return { x: centerX + radius * Math.cos(angle), y: centerY + radius * Math.sin(angle) };
  };

  const getLabelPosition = (index) => {
    const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
    const labelR = radius + 50;
    return { x: centerX + labelR * Math.cos(angle), y: centerY + labelR * Math.sin(angle) };
  };

  const activeGod = selectedGod !== null ? selectedGod : hoveredGod;
  const oppositeIndex = activeGod !== null ? (activeGod + 6) % 12 : null;

  return (
    <div style={{
      minHeight: "100vh",
      background: "radial-gradient(ellipse at center, #141428 0%, #08080f 60%, #000003 100%)",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      justifyContent: "center",
      fontFamily: "'Cinzel', 'Palatino Linotype', 'Book Antiqua', serif",
      padding: "20px",
      position: "relative",
      overflow: "hidden",
    }}>
      <div style={{ position: "absolute", width: "900px", height: "900px", border: "1px solid rgba(212, 175, 55, 0.02)", borderRadius: "50%", animation: "slowRotate 180s linear infinite", pointerEvents: "none" }} />
      <div style={{ position: "absolute", width: "700px", height: "700px", border: "1px solid rgba(212, 175, 55, 0.015)", borderRadius: "50%", animation: "slowRotateReverse 120s linear infinite", pointerEvents: "none" }} />

      <h1 style={{ fontFamily: "'Cinzel Decorative', 'Cinzel', serif", fontSize: "36px", fontWeight: 900, color: "#d4af37", letterSpacing: "14px", textTransform: "uppercase", marginBottom: "4px", textShadow: "0 0 60px rgba(212, 175, 55, 0.25)" }}>
        The Pantheon
      </h1>
      <p style={{ fontFamily: "'Cinzel', serif", fontSize: "11px", color: "rgba(255,255,255,0.3)", letterSpacing: "8px", textTransform: "uppercase", marginBottom: "24px" }}>
        Twelve Gods · Six Oppositions · One Wheel
      </p>

      <svg width="700" height="720" viewBox="0 0 700 720" style={{ maxWidth: "100%", height: "auto" }}>
        <defs>
          {gods.map((god, i) => (
            <radialGradient key={`grad-${i}`} id={`orb-${i}`}>
              <stop offset="0%" stopColor={god.glow} stopOpacity="1" />
              <stop offset="30%" stopColor={god.glow} stopOpacity="0.85" />
              <stop offset="70%" stopColor={god.color} stopOpacity="0.7" />
              <stop offset="100%" stopColor={god.color} stopOpacity="0.35" />
            </radialGradient>
          ))}
          <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="coloredBlur" /><feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <filter id="bigGlow"><feGaussianBlur stdDeviation="14" result="coloredBlur" /><feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <filter id="lineGlow"><feGaussianBlur stdDeviation="4" result="coloredBlur" /><feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <filter id="lightStar"><feGaussianBlur stdDeviation="20" result="coloredBlur" /><feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <radialGradient id="centerAura">
            <stop offset="0%" stopColor="rgba(212, 175, 55, 0.06)" />
            <stop offset="100%" stopColor="rgba(212, 175, 55, 0)" />
          </radialGradient>
        </defs>

        <circle cx={centerX} cy={centerY} r={110} fill="url(#centerAura)" style={{ animation: "centerGlow 6s ease-in-out infinite" }} />
        <circle cx={centerX} cy={centerY} r={radius} fill="none" stroke="rgba(212, 175, 55, 0.1)" strokeWidth="2" />
        <circle cx={centerX} cy={centerY} r={radius - 12} fill="none" stroke="rgba(212, 175, 55, 0.03)" strokeWidth="0.5" strokeDasharray="2 8" />
        <circle cx={centerX} cy={centerY} r={radius + 12} fill="none" stroke="rgba(212, 175, 55, 0.03)" strokeWidth="0.5" strokeDasharray="2 8" />
        <circle cx={centerX} cy={centerY} r={75} fill="none" stroke="rgba(212, 175, 55, 0.04)" strokeWidth="0.5" />
        <text x={centerX} y={centerY + 3} textAnchor="middle" dominantBaseline="middle" fill="rgba(212, 175, 55, 0.12)" fontSize="36" fontFamily="'Cinzel Decorative', serif" fontWeight="900">✦</text>

        {gods.map((god, i) => {
          const nextI = (i + 1) % total;
          const pos1 = getPosition(i);
          const pos2 = getPosition(nextI);
          const isTransition = (i === 5 || i === 11);
          return (
            <line key={`arc-${i}`} x1={pos1.x} y1={pos1.y} x2={pos2.x} y2={pos2.y}
              stroke={isTransition ? "rgba(212, 175, 55, 0.06)" : "rgba(212, 175, 55, 0.05)"}
              strokeWidth="1" strokeDasharray={isTransition ? "3 5" : "none"} />
          );
        })}

        {gods.map((god, i) => {
          const pos = getPosition(i);
          const labelPos = getLabelPosition(i);
          const isActive = activeGod === i;
          const isOpposite = oppositeIndex === i;
          const isHighlighted = isActive || isOpposite;
          const isDimmed = activeGod !== null && !isHighlighted;
          const currentR = isHighlighted ? orbRadius + 6 : orbRadius;
          const isLightGod = god.name === "Light";
          const isDarkVoid = god.name === "Darkness" || god.name === "Oblivion";
          return (
            <g key={`god-${i}`}
              onMouseEnter={() => setHoveredGod(i)}
              onMouseLeave={() => setHoveredGod(null)}
              onClick={() => setSelectedGod(selectedGod === i ? null : i)}
              style={{ cursor: "pointer" }}>
              {isLightGod && (
                <>
                  <circle cx={pos.x} cy={pos.y} r={currentR + 45} fill="white"
                    opacity={isHighlighted ? 0.12 : 0.04} filter="url(#lightStar)"
                    style={{ transition: "opacity 0.4s ease", animation: "lightRadiance 4s ease-in-out infinite" }} />
                  <circle cx={pos.x} cy={pos.y} r={currentR + 25} fill="white"
                    opacity={isHighlighted ? 0.2 : 0.08} filter="url(#bigGlow)"
                    style={{ transition: "opacity 0.4s ease" }} />
                </>
              )}
              <circle cx={pos.x} cy={pos.y} r={currentR + 20} fill={god.glow}
                opacity={isHighlighted ? 0.3 : isDimmed ? 0.015 : 0.06}
                filter="url(#bigGlow)" style={{ transition: "opacity 0.4s ease" }} />
              {isDarkVoid && (
                <circle cx={pos.x} cy={pos.y} r={currentR + 2} fill="none"
                  stroke={isHighlighted ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.08)"}
                  strokeWidth="1.5" style={{ transition: "stroke 0.3s ease" }} />
              )}
              <circle cx={pos.x} cy={pos.y} r={currentR} fill={`url(#orb-${i})`}
                filter="url(#glow)"
                stroke={isHighlighted ? god.glow : "rgba(255,255,255,0.06)"}
                strokeWidth={isHighlighted ? 2.5 : 0.5}
                opacity={isDimmed ? 0.35 : 1}
                style={{ transition: "all 0.3s ease" }} />
              <circle cx={pos.x - 5} cy={pos.y - 7} r={currentR * 0.28} fill="white"
                opacity={isLightGod ? 0.7 : isHighlighted ? 0.4 : isDimmed ? 0.03 : 0.15}
                style={{ transition: "opacity 0.3s ease" }} />
              <text x={labelPos.x} y={labelPos.y} textAnchor="middle" dominantBaseline="middle"
                fill={isHighlighted ? (isLightGod ? "#FFFFFF" : god.glow) : isDimmed ? "rgba(255,255,255,0.15)" : (god.side === "light" ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.45)")}
                fontSize={isHighlighted ? "15" : "12.5"} fontFamily="'Cinzel', serif"
                fontWeight={isHighlighted ? "700" : "600"} letterSpacing="2.5px"
                style={{ transition: "all 0.3s ease", textShadow: isHighlighted ? `0 0 30px ${god.glow}60` : "none" }}>
                {god.name.toUpperCase()}
              </text>
            </g>
          );
        })}

        {activeGod !== null && oppositeIndex !== null && (() => {
          const pos1 = getPosition(activeGod);
          const pos2 = getPosition(oppositeIndex);
          const god1 = gods[activeGod];
          const god2 = gods[oppositeIndex];
          const gradId = `opp-${activeGod}-${oppositeIndex}`;
          const color1 = god1.name === "Darkness" ? "#888888" : god1.glow;
          const color2 = god2.name === "Darkness" ? "#888888" : god2.glow;
          return (
            <g filter="url(#lineGlow)">
              <defs>
                <linearGradient id={gradId} x1={pos1.x} y1={pos1.y} x2={pos2.x} y2={pos2.y} gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stopColor={color1} stopOpacity="1" />
                  <stop offset="40%" stopColor="rgba(212, 175, 55, 0.5)" />
                  <stop offset="60%" stopColor="rgba(212, 175, 55, 0.5)" />
                  <stop offset="100%" stopColor={color2} stopOpacity="1" />
                </linearGradient>
              </defs>
              <line x1={pos1.x} y1={pos1.y} x2={pos2.x} y2={pos2.y}
                stroke={`url(#${gradId})`} strokeWidth="3"
                style={{ animation: "connectionPulse 2.5s ease-in-out infinite" }} />
            </g>
          );
        })()}
      </svg>

      <div style={{ height: "100px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        {activeGod !== null ? (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: "28px", marginBottom: "12px" }}>
              <span style={{ fontFamily: "'Cinzel Decorative', serif", fontSize: "22px", fontWeight: 700, color: gods[activeGod].name === "Light" ? "#FFFFFF" : gods[activeGod].glow, letterSpacing: "5px", textShadow: `0 0 40px ${gods[activeGod].glow}40` }}>
                {gods[activeGod].name.toUpperCase()}
              </span>
              <span style={{ fontFamily: "'Cinzel Decorative', serif", fontSize: "14px", color: "rgba(212, 175, 55, 0.4)" }}>◆</span>
              <span style={{ fontFamily: "'Cinzel Decorative', serif", fontSize: "22px", fontWeight: 700, color: gods[oppositeIndex].name === "Light" ? "#FFFFFF" : gods[oppositeIndex].glow, letterSpacing: "5px", textShadow: `0 0 40px ${gods[oppositeIndex].glow}40` }}>
                {gods[oppositeIndex].name.toUpperCase()}
              </span>
            </div>
            <div style={{ display: "flex", gap: "50px", alignItems: "center" }}>
              <span style={{ fontFamily: "'Cinzel', serif", fontSize: "10.5px", color: `${gods[activeGod].glow}80`, letterSpacing: "2px", textTransform: "uppercase" }}>
                {gods[activeGod].domain}
              </span>
              <span style={{ fontSize: "8px", color: "rgba(212, 175, 55, 0.3)" }}>⟷</span>
              <span style={{ fontFamily: "'Cinzel', serif", fontSize: "10.5px", color: `${gods[oppositeIndex].glow}80`, letterSpacing: "2px", textTransform: "uppercase" }}>
                {gods[oppositeIndex].domain}
              </span>
            </div>
          </>
        ) : (
          <p style={{ fontFamily: "'Cinzel', serif", fontSize: "11px", color: "rgba(255,255,255,0.2)", letterSpacing: "5px", textTransform: "uppercase" }}>
            Touch a god to reveal the opposition
          </p>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PantheonCircle));
    </script>
  </body>
</html>
